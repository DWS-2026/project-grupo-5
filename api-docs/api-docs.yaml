  /api/v1/products/{id}:
    get:
      tags:
      - Products
      summary: Returns a product with a given id
      operationId: getProduct
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "404":
          description: Product with given id could not be found
          content: {}
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                type: object
        "200":
          description: Found the product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDTO"
    put:
      tags:
      - Products
      summary: Modify a product
      operationId: editProduct
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUploadDTO"
        required: true
      responses:
        "404":
          description: Product with id was not found
          content: {}
        "400":
          description: Object passed is invalid
          content: {}
        "200":
          description: Product was updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDTO"
        "403":
          description: User does not have permission to edit the product
    delete:
      tags:
      - Products
      summary: Delete a product with a given id
      operationId: deleteProduct
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "404":
          description: Product was not found
          content: {}
        "400":
          description: Bad Request
          content:
