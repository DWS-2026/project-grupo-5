components:
  schemas:
    UserBasicDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
    ReviewUploadDTO:
      type: object
      properties:
        name:
          type: string
        rating:
          type: integer
          format: int32
        description:
          type: string
    ReviewDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        rating:
          type: integer
          format: int32
        author:
          $ref: "#/components/schemas/UserBasicDTO"
        files:
          type: array
          items:
            type: string
    ProductUploadDTO:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        stock:
          type: integer
          format: int32
    ImageDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
    ProductDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        vendor:
          $ref: "#/components/schemas/UserBasicDTO"
        price:
          type: number
          format: double
        stock:
          type: integer
          format: int32
        description:
          type: string
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/ReviewSummaryDTO"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageDTO"
    ReviewSummaryDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        rating:
          type: integer
          format: int32
    StringDTO:
      type: object
      properties:
        str:
          type: string
    UserLoginDTO:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - SUCCESS
          - FAILURE
        message:
          type: string
        error:
          type: string
    ProductSummaryDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
    OrderDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        price:
          type: number
          format: double
        user:
          $ref: "#/components/schemas/UserBasicDTO"
        isClosed:
          type: boolean
        products:
          type: array
          items:
            $ref: "#/components/schemas/OrderProductDTO"
    OrderProductDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int32
        product:
          $ref: "#/components/schemas/ProductSummaryDTO"
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    Pageable:
      type: object
      properties:
        page:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 1
        sort:
          type: array
          items:
            type: string
