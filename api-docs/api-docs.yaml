openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: https://localhost:8443
  description: Generated server url
tags:
- name: Products
  description: Endpoints related to manipulating products
- name: Reviews
  description: Endpoints related to manipulating product reviews
paths:
  /api/v1/users/:
    get:
      tags:
      - rest-user-controller
      summary: Get all users
      operationId: getAllUsers
      parameters:
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "404":
          description: Could not found any user
          content: {}
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                type: object
        "200":
          description: Found users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserBasicDTO"
    put:
      tags:
      - rest-user-controller
      summary: Update an user
      operationId: updateUserEmailorUsername
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserBasicDTO"
        required: true
      responses:
        "404":
          description: There is no user with the given ID
          content: {}
        "400":
          description: Invalid request body
          content: {}
        "200":
          description: User has been updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBasicDTO"
        "403":
          description: You do not have permission to update the user
    post:
      tags:
      - rest-user-controller
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLoginDTO"
        required: true
      responses:
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                type: object
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                type: object
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserBasicDTO"
  /api/v1/products/{productId}/reviews/{reviewId}:
    put:
      tags:
      - Reviews
      summary: Edits a product review
      operationId: editReview
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: reviewId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewUploadDTO"
        required: true
      responses:
        "404":
          description: Product or review with given ID was not found
          content: {}
        "400":
          description: Edited review contents are invalid
          content: {}
        "200":
          description: Product was edited successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewDTO"
        "403":
          description: User is not logged in or cannot edit review
    delete:
      tags:
      - Reviews
      summary: Deletes a product review
      operationId: deleteReview
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: reviewId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "404":
          description: Product or review with given ID was not found
          content: {}
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                type: object
        "200":
          description: Review was deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewDTO"
        "403":
          description: User is not logged in or cannot delete review
