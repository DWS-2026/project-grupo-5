  /api/v1/products/:
    get:
      tags:
      - Products
      summary: Get products with an optional query
      operationId: getProducts
      parameters:
      - name: search
        in: query
        description: Optional query
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: Zero-based page index (0..N)
        required: false
        schema:
          type: integer
          default: 0
          minimum: 0
      - name: size
        in: query
        description: The size of the page to be returned
        required: false
        schema:
          type: integer
          default: 12
          minimum: 1
      - name: sort
        in: query
        description: "Sorting criteria in the format: property,(asc|desc). Default\
          \ sort order is ascending. Multiple sort criteria are supported."
        required: false
        schema:
          type: array
          items:
            type: string
      responses:
        "404":
          description: Could not find products with given query
          content: {}
        "400":
          description: Page number is out of bounds
          content: {}
        "200":
          description: Found products to display
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductSummaryDTO"
    post:
      tags:
