<!DOCTYPE html>
<html lang="en">
<head>
    {{>docHead}}
</head>
<body class="bg-dark min-vh-100 py-2 bg-opacity-75">

    {{>header}}

    <main class="mt-3 pt-2 pb-5">
        <section>
            <!-- Categories -->

            <!-- Main Products -->
            <div class="container">
                <div class="row row-cols-1 row-cols-md-4 g-4 mx-1 align-items-center">
                    {{#products}}
                    <div class="col">
                        <a href="/product/{{id}}" class="text-decoration-none card bg-body border-dark border-opacity-75 rounded-5 overflow-hidden">
                            <div class="card shadow-sm bg-body-secondary height: 10em;">
                                {{#productImages}}{{#-first}}
                                    <img src="/images/{{id}}" onerror="this.src='/logo2.png';" style="height: 15rem; object-fit: cover;">
                                {{/-first}}{{/productImages}}
                                <div class="card-body text-white">
                                    <h5 class="card-title">{{name}}</h5>
                                    <p class="card-text">{{description}}</p>
                                </div>
                            </div>
                        </a>
                    </div>
                    {{/products}}
                </div>
            </div>

        </section>
        <section>
            <!-- Available Pages -->
            <nav class="my-4">

                 <ul class="pagination justify-content-center ">
                    <li class="page-item {{^hasprev}}disabled{{/hasprev}}">
                        <a class="page-link bg-body bg-opacity-10 text-white border-dark border-opacity-25 rounded-5 rounded-end" href="/index?page={{prev}}{{#search}}&search={{search}}{{/search}}">Previous</a>
                    </li>
                    <li class="page-item"><a class="page-link bg-body bg-opacity-10 text-white border-dark border-opacity-25" href="/index?">1</a></li>
                    <li class="page-item"><a class="page-link bg-body bg-opacity-10 text-white border-dark border-opacity-25" href="#">2</a></li>
                    <li class="page-item"><a class="page-link bg-body bg-opacity-10 text-white border-dark border-opacity-25" href="#">3</a></li>
                    <li class="page-item disabled"><a class="page-link bg-body bg-opacity-10 text-white border-dark border-opacity-25">...</a></li>
                    <li class="page-item"><a class="page-link bg-body bg-opacity-10 text-white border-dark border-opacity-25" href="#">50</a></li>
                    <li class="page-item {{^hasnext}}disabled{{/hasnext}}">
                        <a class="page-link bg-body bg-opacity-10 text-white border-dark border-opacity-25 rounded-5 rounded-start" href="/index?page={{next}}{{#search}}&search={{search}}{{/search}}">Next</a>
                    </li>
                </ul>

            </nav>
        </section>

    </main>

</body>
</html>
