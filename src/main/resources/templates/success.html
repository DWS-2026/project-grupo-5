<!DOCTYPE html>
<html lang="es">
<head>
    {{>docHead}}
    <style>
        .success-icon {
            font-size: 6rem;
            color: var(--green);
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .order-card {
            background-color: var(--overlay-bg);
            border: 1px solid var(--item-bg);
            border-radius: 20px;
        }
    </style>
</head>

<body class="bg-dark min-vh-100 py-2 bg-opacity-75">

    {{>header}}

    <main class="container d-flex flex-column align-items-center justify-content-center text-center" style="min-height: 80vh;">
        
        <div class="mb-4">
            <i class="bi bi-check-circle-fill success-icon"></i>
        </div>

        <h1 class="text-white fw-bold mb-2">¡PAGO COMPLETADO!</h1>
        <p class="text-white-50 mb-4 fs-5">Tu pedido ha sido procesado con éxito y ya está en camino.</p>

        <div class="order-card p-4 mb-5 text-start w-100" style="max-width: 500px;">
            <div class="d-flex justify-content-between mb-2">
                <span class="text-white-50">Nº de pedido:</span>
                <span class="text-white fw-bold">#{{orderId}}</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
                <span class="text-white-50">Fecha:</span>
                <span class="text-white">{{date}}</span>
            </div>
            <hr class="text-secondary">
            <div class="d-flex justify-content-between">
                <span class="text-white-50">Total pagado:</span>
                <span class="text-primary fw-bold fs-5">{{totalPrice}}€</span>
            </div>
        </div>

        <div class="d-flex flex-column flex-sm-row gap-3">
            <a href="/" class="btn btn-primary btn-lg px-5">Ir al Inicio</a>
            <a href="/user/{{id}}" class="btn btn-secondary btn-lg px-4 text-white">Ver mis pedidos</a>
        </div>

    </main>

</body>
</html>
