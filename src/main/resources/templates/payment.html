<!DOCTYPE html>
<html lang="en">
<head>
    {{>docHead}}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-dark min-vh-100 py-2 bg-opacity-75">

<div class="bg-grid"></div>

{{>header}}
<main>
    <div class="container py-5">
        <div class="row g-5">
            <div class="col-md-7 col-lg-8">
                <div class="card bg-body border-secondary p-4 rounded-4 shadow">
                    <h4 class="mb-4 text-white"><i class="bi bi-credit-card-2-front me-2 text-primary"></i>Finalizar Compra</h4>

                    <form class="needs-validation" action="/success" method="POST">
                        
                        <input type="hidden" name="_csrf" value="{{token}}">

                        <div class="row g-3">
                            <div class="col-sm-6">
                                <label class="form-label text-white-50">Nombre</label>
                                <input type="text" name="firstName" class="form-control" placeholder="John" required>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label text-white-50">Apellido</label>
                                <input type="text" name="lastName" class="form-control" placeholder="Doe" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label text-white-50">Dirección de Envío</label>
                                <input type="text" name="address" class="form-control" placeholder="Calle Principal 123" required>
                            </div>

                            <hr class="my-4 border-secondary">

                            <h5 class="text-white mb-3">Método de Pago</h5>
                            <div class="my-3 text-white">
                                <div class="form-check mb-2">
                                    <input id="credit" name="paymentMethod" type="radio" value="credit_card" class="form-check-input" checked required onchange="actualizarMetodoPago()">
                                    <label class="form-check-label" for="credit">Tarjeta de Crédito</label>
                                </div>
                                <div class="form-check mb-2">
                                    <input id="paypal" name="paymentMethod" type="radio" value="paypal" class="form-check-input" required onchange="actualizarMetodoPago()">
                                    <label class="form-check-label" for="paypal">PayPal</label>
                                </div>
                            </div>

                            <div id="section-credit" class="row gy-3">
                                <div class="col-md-6">
                                    <label class="form-label text-white-50">Nombre en la tarjeta</label>
                                    <input type="text" name="cardHolder" class="form-control input-tarjeta" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-white-50">Número de tarjeta</label>
                                    <input type="text" name="cardNumber" class="form-control input-tarjeta" placeholder="0000 0000 0000 0000" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label text-white-50">Expiración</label>
                                    <input type="text" name="expiryDate" class="form-control input-tarjeta" placeholder="MM/YY" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label text-white-50">CVV</label>
                                    <input type="text" name="cvv" class="form-control input-tarjeta" placeholder="123" required>
                                </div>
                            </div>

                            <div id="section-paypal" class="col-12 d-none">
                                <div class="card bg-primary bg-opacity-10 border-primary border-opacity-25 p-4 rounded-4">
                                    <div class="d-flex align-items-center mb-3">
                                        <i class="bi bi-paypal text-primary fs-3 me-2"></i>
                                        <span class="text-white fw-bold">Cuenta de PayPal</span>
                                    </div>
                                    <label class="form-label text-white-50">Correo electrónico de PayPal</label>
                                    <input type="email" name="paypalEmail" id="paypalEmail" class="form-control form-control-lg" placeholder="usuario@ejemplo.com">
                                </div>
                            </div>

                            <hr class="my-4 border-secondary">
                            
                            <button class="w-100 btn btn-primary btn-lg rounded-pill py-3" type="submit" >
                                Confirmar y Pagar
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-md-5 col-lg-4">
                <div class="card bg-body-secondary border-secondary p-4 rounded-4 sticky-top" style="top: 2rem;">
                    <h4 class="d-flex justify-content-between align-items-center mb-3 text-white">
                        <span>Tu Carrito</span>
                        <span class="badge bg-success rounded-pill">{{cart.numberOfProducts}}</span>
                    </h4>
                    <ul class="list-group list-group-flush mb-3">
                        {{#cart.products}}
                        <li class="list-group-item d-flex justify-content-between lh-sm bg-transparent text-white border-secondary">
                            <div>
                                <h6 class="my-0">{{product.name}} (x{{quantity}})</h6>
                            </div>
                            <span class="text-white-50">€{{product.price}}</span>
                        </li>
                        {{/cart.products}}
                        
                        <li class="list-group-item d-flex justify-content-between bg-transparent text-primary border-secondary mb-2">
                            <span>Total (EU)</span>
                            <strong>€{{totalPrice}}</strong>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    function actualizarMetodoPago() {
        const esPaypal = document.getElementById('paypal').checked;
        const seccionTarjeta = document.getElementById('section-credit');
        const seccionPaypal = document.getElementById('section-paypal');
        const inputsTarjeta = document.querySelectorAll('.input-tarjeta');
        const inputPaypalEmail = document.getElementById('paypalEmail');
        const btnSubmit = document.getElementById('btn-submit');

        if (esPaypal) {
            seccionTarjeta.classList.add('d-none');
            seccionPaypal.classList.remove('d-none');
            btnSubmit.innerHTML = '<i class="bi bi-paypal me-2"></i> Pagar con PayPal';
            inputsTarjeta.forEach(i => { i.required = false; i.disabled = true; });
            inputPaypalEmail.required = true;
            inputPaypalEmail.disabled = false;
        } else {
            seccionTarjeta.classList.remove('d-none');
            seccionPaypal.classList.add('d-none');
            btnSubmit.innerHTML = 'Confirmar y Pagar';
            inputsTarjeta.forEach(i => { i.required = true; i.disabled = false; });
            inputPaypalEmail.required = false;
            inputPaypalEmail.disabled = true;
        }
    }

    // Inicializar estado de inputs al cargar
    window.onload = actualizarMetodoPago;

    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>

</body>
</html>
