<!DOCTYPE html>
<html lang="en">
<head>
    {{>docHead}}
</head>
<body class="bg-dark min-vh-100 py-2 bg-opacity-75">

    {{>header}}

    <main class="container d-flex justify-content-center align-items-center mt-3 pt-2" style="min-height: 80vh;">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card bg-dark text-white border-secondary shadow-lg rounded-4">
            <div class="card-body p-5">
                <!--Log in and Sign in buttons-->
                <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
                    <li class="nav-item">
                        <a href="/login" class="nav-link {{#showLogin}}active{{/showLogin}} text-white">Log in</a>
                    </li>
                    <li class="nav-item">
                        <a href="/register" class="nav-link {{#showRegister}}active{{/showRegister}} text-white">Sign up</a>
                    </li>
                </ul>
                
                <div class="tab-content" id="pills-tabContent">
                    
                    {{#showLogin}}
                    <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                        <form action="/login" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control bg-dark text-white" placeholder="name@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control bg-dark text-white" placeholder="••••••••" required>
                            </div>

                            {{#error}}
                            <div class="alert alert-danger py-2 mt-2" role="alert">
                                <small>{{error}}</small>
                            </div>
                            {{/error}}

                            <div class="d-grid gap-2 mt-4">
                                <button class="btn btn-primary" type="submit">Log in</button>
                            </div>
                        </form>
                    </div>
                    {{/showLogin}}

                    {{#showRegister}}
                    <div class="tab-pane fade show active" id="pills-register" role="tabpanel">
                        <form action="/register" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" name="username" class="form-control bg-dark bg-opacity-25 text-white" placeholder="Name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control bg-dark bg-opacity-25 text-white" placeholder="name@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control bg-dark bg-opacity-25 text-white" placeholder="••••••••" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirm password</label>
                                <input type="password" name="confirmPassword" class="form-control bg-dark bg-opacity-25 text-white" placeholder="••••••••" required>
                            </div>

                            {{#error}}
                            <div class="alert alert-warning py-2 mt-2" role="alert">
                                <small>{{error}}</small>
                            </div>
                            {{/error}}

                            <div class="d-grid gap-2 mt-4">
                                <button class="btn btn-primary" type="submit">Create account</button>
                            </div>
                        </form>
                    </div>
                    {{/showRegister}}
                </div>

            </div>
        </div>
    </div>
</main>
</body>
</html>
