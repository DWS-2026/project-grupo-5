<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link type="text/css" rel="stylesheet" href="plantilla.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <title>CanaryShop</title>
</head>

<body class="bg-dark min-vh-100 py-2 bg-opacity-75">

    {{>header}}
    <main>
        <!-- Back button -->
        <div class="container d-flex flex-column flex-md-row my-4 p-4 p-md-0">
            <a href="usuario" class="btn btn-secondary btn-lg flex-grow-1">Back</a>
        </div>
        <div class="container mb-4 pb-4">
            <div class="row justify-content-center">
                <form action="new" method="POST" class="col-md-6 text-center">

                    <h4 class="text-white mb-4">New product</h4>

                    <!-- Where images are uploaded -->
                    <div class="upload-container pb-2">
                        <input type="file" name="images" id="file-input" accept="image/*" hidden multiple>
                        <label for="file-input" class="upload-label">
                            <div class="upload-content">
                                <i class="bi bi-plus-square-dotted"></i>
                            </div>
                        </label>
                    </div>

                    <!-- Uploaded images -->
                    <div id="preview-grid" class="my-2 row g-3">

                        <div class="col-6 col-sm-4 col-md-3 col-lg-2">
                            <div class="preview-card">
                                <img src="https://picsum.photos/200/200?random=1" alt="Preview">
                                <button class="btn-remove"><i class="bi bi-x-lg"></i></button>
                            </div>
                        </div>

                        <div class="col-6 col-sm-4 col-md-3 col-lg-2">
                            <div class="preview-card">
                                <img src="https://picsum.photos/200/200?random=2" alt="Preview">
                                <button class="btn-remove"><i class="bi bi-x-lg"></i></button>
                            </div>
                        </div>

                        <div class="col-6 col-sm-4 col-md-3 col-lg-2">
                            <div class="preview-card">
                                <img src="https://picsum.photos/200/200?random=3" alt="Preview">
                                <button class="btn-remove"><i class="bi bi-x-lg"></i></button>
                            </div>
                        </div>

                    </div>

                    <!-- Product name and description -->
                    <div class="my-3">
                    <input type="text" name="title" class="form-control bg-body-secondary" id="exampleFormControlInput1" placeholder="Product name">
                    </div>
                    <div class="my-3">
                    <textarea class="form-control bg-body-secondary" name="description" id="exampleFormControlTextarea1" rows="5" placeholder="Description"></textarea>
                    </div>
                    <div class="my-3">
                        <input type="number" name="price" class="form-control bg-body-secondary" min="0" max="100000" step="0.01" placeholder="Price">
                    </div>
                    <!-- Stock selector -->
                    <div class="my-3 d-flex align-items-center justify-content-between bg-body-secondary p-3 rounded">
                        <label for="stockSelector" class="form-label text-white">Stock</label>
                        <div id="stockSelector" class="d-flex gap-4 text-white align-items-center">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="indeterminateStock">
                                <label for="indeterminateStock" class="form-check-label">Limitless</label>
                            </div>
                            <input type="number" name="stock" class="form-control bg-body-secondary" min="0" max="100000" placeholder="1">
                        </div>
                    </div>


                    <!-- Input button -->
                    <button class="btn btn-primary mb-4" type="submit">Submit</button>
                </form>
            </div>
        </div>

    </main>
</body>
</html>
