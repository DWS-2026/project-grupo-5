<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link type="text/css" rel="stylesheet" href="plantilla.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <title>CanaryShop</title>
</head>

<body class="bg-dark min-vh-100 py-2 bg-opacity-75">

{{>header}}

    <main>

        <div class="d-flex flex-md-row flex-column flex-wrap ">
            {{>adminNav}}
            
            <!-- Admin user -->
            <div class="col-md-2 mx-4 my-5 col-10  align-self-center align-self-md-start">

                <div class="card shadow-sm bg-body-secondary rounded-5 border border-2 border-secondary">
                    <img src="user.jpg" class="rounded-circle mx-3 my-3" alt="product Pthoto" onerror="this.src='logo2.png';">
                    <div class="card-body text-white">
                        <h4>ID: 0</h4>
                        <h5 class="card-title">Admin</h5>
                        <p class="card-text">Admin description</p>
                    </div>
                </div>

            </div>

            <!-- 5 recents notifications -->
            <div class="col-md-5 col-10 mx-auto bg-body my-md-5 pb-5 rounded-5 w-md-50 d-flex flex-column shadow-lg border border-2 border-secondary">
                <div class="align-self-center text-primary my-1">
                    <h2 class="my-2">Notification </h2>
                </div>

                <!-- Each notification -->
                <div class=" text-white mx-3 bg-body-tertiary my-2 rounded-pill">
                    <h5 class="mx-4 my-2">Notification number 1</h5>
                    <p class="mx-4">Resume</p>
                </div>

                <div class=" text-white mx-3 bg-body-tertiary my-2 rounded-pill">
                    <h5 class="mx-4 my-2">Notification number 1</h5>
                    <p class="mx-4 ">Resume</p>
                </div>

                <div class=" text-white mx-3 bg-body-tertiary my-2 rounded-pill">
                    <h5 class="mx-4 my-2">Notification number 2</h5>
                    <p class="mx-4 ">Resume</p>
                </div>

                <div class="text-white mx-3 bg-body-tertiary my-2 rounded-pill">
                    <h5 class="mx-4 my-2">Notification number 3</h5>
                    <p class="mx-4 ">Resume</p>  
                </div>

                <div class="text-white mx-3 bg-body-tertiary my-2 rounded-pill">
                    <h5 class="mx-4 my-2">Notification number 4</h5>
                    <p class="mx-4 ">Resume</p>
                </div>
                
                <div class="text-white mx-3 bg-body-tertiary my-2 rounded-pill">
                    <h5 class="mx-4 my-2">Notification number 5</h5>
                    <p class="mx-4 ">Resume</p>
                </div>

            </div>
        </div>
    </main>
</body>
</html>
